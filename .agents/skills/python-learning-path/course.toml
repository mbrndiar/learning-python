prerequisites = ["milestone.idiomatic-ingest-report.domain"]
required_outcome = "Stream exact CSV and JSONL inputs, close iterators, inject collaborators, and classify CLI errors."
test_command = "CAPSTONE_IMPLEMENTATION=starter python -m unittest discover -s capstones/idiomatic/tests -p 'test_m2_*.py' -v"

[[capstones.milestones]]
id = "milestone.idiomatic-ingest-report.sqlite"
ordinal = 3
title = "SQLite"
prerequisites = ["milestone.idiomatic-ingest-report.sources-and-application"]
required_outcome = "Initialize and validate schema version 1 while preserving identities and atomic imports."
test_command = "CAPSTONE_IMPLEMENTATION=starter python -m unittest discover -s capstones/idiomatic/tests -p 'test_m3_*.py' -v"

[[capstones.milestones]]
id = "milestone.idiomatic-ingest-report.reporting"
ordinal = 4
title = "Reporting"
prerequisites = ["milestone.idiomatic-ingest-report.sqlite"]
required_outcome = "Combine filters, aggregate stable results, and render documented JSON and text reports."
test_command = "CAPSTONE_IMPLEMENTATION=starter python -m unittest discover -s capstones/idiomatic/tests -p 'test_m4_*.py' -v"

[[capstones.milestones]]
id = "milestone.idiomatic-ingest-report.http-and-integration"
ordinal = 5
title = "HTTP and integration"
prerequisites = ["milestone.idiomatic-ingest-report.reporting"]
required_outcome = "Implement bounded page fetching, ordered collection, cancellation cleanup, and strict or partial semantics."
test_command = "CAPSTONE_IMPLEMENTATION=starter python -m unittest discover -s capstones/idiomatic/tests -p 'test_m5_*.py' -v"

