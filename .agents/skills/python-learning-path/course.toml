review_questions = { path = "lessons/01_python_fundamentals/README.md", heading = "❓ Review questions (closed notes)" }
exercise_starter = "exercises/01_python_fundamentals/exercises.py"
exercise_solution = "exercises/01_python_fundamentals/solutions.py"
validation_commands = ["python exercises/01_python_fundamentals/exercises.py"]
solution_lock_group = "solutions.module.python-fundamentals"
required_outcomes = [
  "Run a Python script from the repository root and read its output.",
  "Bind names to values and explain what rebinding does and does not affect.",
  "Recognize core scalar types (str, int, float, bool, None) and their literals.",
  "Convert between types explicitly and reason about truthiness in a condition.",
]

