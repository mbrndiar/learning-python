name: Run lessons, project, and capstones

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-course:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install development dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Check documentation links
        if: matrix.python-version == '3.14'
        run: python scripts/check_markdown_links.py

      - name: Check formatting, linting, and types
        if: matrix.python-version == '3.14'
        run: |
          ruff format --check .
          ruff check .
          mypy
          mypy --strict \
            capstones/comparative/starter/comparative_kv \
            capstones/idiomatic/starter/ingest_report \
            projects/tasks/starter

      - name: Run every lesson script
        run: |
          set -e
          while IFS= read -r -d '' file; do
            echo "::group::python $file"
            python "$file"
            echo "::endgroup::"
          done < <(find lessons \( -type d -exec test -e '{}/__init__.py' \; -prune \) -o \( -name "*.py" ! -name "__init__.py" -print0 \) | sort -z)

      - name: Run every exercise solution
        run: |
          set -e
          while IFS= read -r -d '' file; do
            echo "::group::python $file"
            python "$file"
            echo "::endgroup::"
          done < <(find exercises -name "solutions.py" -print0 | sort -z)

      - name: Compile exercise starters
        run: python -m compileall -q exercises

      - name: Validate Task REST API and clients project
        run: |
          python -m compileall -q \
            projects/tasks/starter \
            projects/tasks/solution \
            projects/tasks/tests
          PROJECT_IMPLEMENTATION=starter \
            python -m pytest projects/tasks/tests -q
          PROJECT_IMPLEMENTATION=solution \
            python -m pytest projects/tasks/tests -q

      - name: Validate capstones
        run: |
          python -m compileall -q \
            capstones/comparative/starter \
            capstones/comparative/solution \
            capstones/idiomatic/starter \
            capstones/idiomatic/solution
          (
            cd capstones/comparative/spec
            sha256sum -c MANIFEST.sha256
          )
          CAPSTONE_IMPLEMENTATION=starter python -m unittest \
            discover -s capstones/comparative/tests -p 'test_harness.py' -v
          CAPSTONE_IMPLEMENTATION=solution python -m unittest \
            discover -s capstones/comparative/tests -p 'test_*.py' -v
          CAPSTONE_IMPLEMENTATION=starter python -m unittest \
            discover -s capstones/idiomatic/tests -p 'test_harness.py' -v
          CAPSTONE_IMPLEMENTATION=solution python -m unittest \
            discover -s capstones/idiomatic/tests -p 'test_*.py' -v

      - name: Measure capstone branch coverage
        if: matrix.python-version == '3.14'
        run: |
          coverage erase
          CAPSTONE_IMPLEMENTATION=solution \
            CAPSTONE_SUBPROCESS_COVERAGE=1 \
            coverage run --parallel-mode -m unittest \
              discover -s capstones/comparative/tests -p 'test_*.py'
          CAPSTONE_IMPLEMENTATION=solution coverage run --parallel-mode -m unittest \
            discover -s capstones/idiomatic/tests -p 'test_*.py'
          coverage combine
          coverage report

      - name: Measure Task project branch coverage
        if: matrix.python-version == '3.14'
        run: |
          coverage erase
          PROJECT_IMPLEMENTATION=solution \
            coverage run -m pytest projects/tasks/tests -q
          coverage report --include="projects/tasks/solution/**/*.py"

      - name: Run pytest lesson with pytest
        run: python -m pytest lessons/09_tooling_and_debugging/04_pytest_basics.py -v
