name: Validate course

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-course:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.14"]
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install development dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate mentor tooling
        run: |
          echo "::group::Mentor state-engine tests"
          python -m unittest discover \
            -s .agents/skills/guided-learning/tests \
            -p 'test_*.py' -v
          echo "::endgroup::"
          echo "::group::Mentor distribution tests"
          python -m unittest discover \
            -s .learning-mentor/tests \
            -p 'test_*.py' -v
          echo "::endgroup::"
          echo "::group::Course manifest validation"
          python .agents/skills/python-learning-path/scripts/course_adapter.py \
            validate
          echo "::endgroup::"
          echo "::group::Course adapter tests"
          python -m unittest discover \
            -s .agents/skills/python-learning-path/tests \
            -p 'test_course_manifest.py' -v
          echo "::endgroup::"
          echo "::group::Compile mentor Python"
          python -m py_compile \
            .agents/skills/guided-learning/scripts/learning_state.py \
            .agents/skills/guided-learning/tests/test_learning_state.py \
            .agents/skills/python-learning-path/scripts/course_adapter.py \
            .agents/skills/python-learning-path/tests/test_course_manifest.py
          echo "::endgroup::"

      - name: Check documentation links
        if: matrix.python-version == '3.14'
        run: python scripts/check_markdown_links.py

      - name: Check formatting, linting, and types
        if: matrix.python-version == '3.14'
        run: |
          ruff format --check .
          ruff format --check \
            .agents/skills/guided-learning/scripts/learning_state.py \
            .agents/skills/guided-learning/tests/test_learning_state.py \
            .agents/skills/python-learning-path/scripts/course_adapter.py \
            .agents/skills/python-learning-path/tests/test_course_manifest.py
          ruff check .
          ruff check \
            .agents/skills/guided-learning/scripts/learning_state.py \
            .agents/skills/guided-learning/tests/test_learning_state.py \
            .agents/skills/python-learning-path/scripts/course_adapter.py \
            .agents/skills/python-learning-path/tests/test_course_manifest.py
          mypy
          mypy --strict \
            capstones/comparative/starter/comparative_kv \
            capstones/idiomatic/starter/ingest_report \
            projects/tasks/starter

      - name: Run every lesson script
        run: |
          set -e
          while IFS= read -r -d '' file; do
            echo "::group::python $file"
            python "$file"
            echo "::endgroup::"
          done < <(find lessons \( -type d -exec test -e '{}/__init__.py' \; -prune \) -o \( -name "*.py" ! -name "__init__.py" -print0 \) | sort -z)

      - name: Run every exercise solution
        run: |
          set -e
          while IFS= read -r -d '' file; do
            echo "::group::python $file"
            python "$file"
            echo "::endgroup::"
          done < <(find exercises -name "solutions.py" -print0 | sort -z)

      - name: Validate packaging example
        run: |
          example="lessons/14_environments_processes_and_packaging/example_distribution"
          output="$RUNNER_TEMP/example-dist"
          target="$RUNNER_TEMP/example-install"
          python -m build --outdir "$output" "$example"
          wheel="$(find "$output" -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$wheel"
          python -m pip install --no-deps --target "$target" "$wheel"
          PYTHONPATH="$target" python -c \
            "from packaging_public_api_example import greet; assert greet('Ada') == 'Hello, Ada.'"
          PYTHONPATH="$target" python -m pydoc packaging_public_api_example \
            | grep -F "A small, documented public API"

      - name: Compile exercise starters
        run: python -m compileall -q exercises

      - name: Validate Task REST API and clients project
        run: |
          python -m compileall -q \
            projects/tasks/starter \
            projects/tasks/solution \
            projects/tasks/tests
          PROJECT_IMPLEMENTATION=starter \
            python -m pytest projects/tasks/tests -q
          PROJECT_IMPLEMENTATION=solution \
            python -m pytest projects/tasks/tests -q

      - name: Validate capstones
        run: |
          python -m compileall -q \
            capstones/comparative/starter \
            capstones/comparative/solution \
            capstones/idiomatic/starter \
            capstones/idiomatic/solution
          (
            cd capstones/comparative/spec
            sha256sum -c MANIFEST.sha256
          )
          CAPSTONE_IMPLEMENTATION=starter python -m unittest \
            discover -s capstones/comparative/tests -p 'test_harness.py' -v
          CAPSTONE_IMPLEMENTATION=solution python -m unittest \
            discover -s capstones/comparative/tests -p 'test_*.py' -v
          CAPSTONE_IMPLEMENTATION=starter python -m unittest \
            discover -s capstones/idiomatic/tests -p 'test_harness.py' -v
          CAPSTONE_IMPLEMENTATION=solution python -m unittest \
            discover -s capstones/idiomatic/tests -p 'test_*.py' -v

      - name: Measure capstone branch coverage
        if: matrix.python-version == '3.14'
        run: |
          python scripts/erase_coverage_data.py
          CAPSTONE_IMPLEMENTATION=solution \
            CAPSTONE_SUBPROCESS_COVERAGE=1 \
            coverage run --parallel-mode -m unittest \
              discover -s capstones/comparative/tests -p 'test_*.py'
          CAPSTONE_IMPLEMENTATION=solution \
            CAPSTONE_SUBPROCESS_COVERAGE=1 \
            coverage run --parallel-mode -m unittest \
            discover -s capstones/idiomatic/tests -p 'test_*.py'
          coverage combine
          coverage report

      - name: Measure Task project branch coverage
        if: matrix.python-version == '3.14'
        run: |
          python scripts/erase_coverage_data.py
          PROJECT_IMPLEMENTATION=solution \
            coverage run -m pytest projects/tasks/tests -q
          coverage report --include="projects/tasks/solution/**/*.py"

      - name: Run pytest lesson with pytest
        run: python -m pytest lessons/12_testing/03_pytest_assertions_parameterization_and_fixtures.py -v
