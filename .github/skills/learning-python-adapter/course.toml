manifest_version = 1
schema_version = "1.0.0"
schema_document = ".github/skills/learning-python-adapter/references/course-schema.md"

[course]
id = "learning-python"
version = "1.0.0"
title = "Learning Python"
description = "A hands-on introduction to Python with lessons, exercises, one applied project, and two required capstones."
language = "python"
requires_python = ">=3.11,<3.15"
minimum_python = "3.11"
maximum_python = "3.14"
learner_entry_point = "README.md"
setup_guide = "docs/SETUP.md"
command_working_directory = "."
final_destinations = [
  { id = "capstone.comparative-kv", path = "capstones/comparative/README.md", required = true },
  { id = "capstone.idiomatic-ingest-report", path = "capstones/idiomatic/README.md", required = true },
]

[[modules]]
id = "module.basics"
ordinal = 1
title = "Basics"
prerequisites = []
lesson_readme = "lessons/01_basics/README.md"
review_questions = { path = "lessons/01_basics/README.md", heading = "❓ Review questions" }
exercise_starter = "exercises/01_basics/exercises.py"
exercise_solution = "exercises/01_basics/solutions.py"
validation_commands = ["python exercises/01_basics/exercises.py"]
solution_lock_group = "solutions.module.basics"
required_outcomes = [
  "Run a Python script and bind values to names.",
  "Recognize core scalar types and convert input explicitly.",
  "Choose suitable numeric representations and perform calculations.",
  "Compare values and cross between Unicode text and encoded bytes.",
]

