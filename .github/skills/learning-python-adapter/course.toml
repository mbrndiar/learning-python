[[projects]]
id = "project.tasks-rest-api-clients"
title = "Task REST API and clients"
required = true
prerequisites = ["module.sql-and-sqlite", "module.rest-apis-and-clients"]
guide_path = "projects/tasks/README.md"
specification_paths = [
  "projects/tasks/docs/SPEC.md",
  "projects/tasks/docs/openapi.yaml",
  "projects/tasks/docs/PLAN.md",
]
starter_root = "projects/tasks/starter"
solution_root = "projects/tasks/solution"
tests_root = "projects/tasks/tests"
validation_commands = [
  "PROJECT_IMPLEMENTATION=starter python -m pytest projects/tasks/tests -q",
  "python -m compileall -q projects/tasks/starter projects/tasks/solution projects/tasks/tests",
  "python -m ruff format --check projects/tasks",
  "python -m ruff check projects/tasks",
  "python -m mypy --strict --no-incremental projects/tasks/starter",
]
solution_lock_group = "solutions.project.tasks-rest-api-clients"
required_outcomes = [
  "Keep one validated Task domain and service contract across every adapter.",
  "Implement SQLite and versioned Markdown repositories behind one protocol.",
  "Implement the standard-library, Flask, and FastAPI server adapters.",
  "Implement urllib, requests, and httpx client transports.",
  "Preserve the HTTP contract and cross-server/client interoperability matrix.",
]

[projects.implementation_selector]
environment = "PROJECT_IMPLEMENTATION"
learner_value = "starter"
reference_value = "solution"
default_value = "solution"

[[projects.milestones]]
id = "milestone.tasks.domain-and-contracts"
ordinal = 1
title = "Domain and contracts"
prerequisites = []
required_outcome = "Implement Task validation, errors, service/repository contracts, and the client transport protocol."
test_command = "PROJECT_IMPLEMENTATION=starter python -m pytest projects/tasks/tests/test_m1_domain.py -q"

[[projects.milestones]]
id = "milestone.tasks.persistence"
ordinal = 2
title = "Persistence"
prerequisites = ["milestone.tasks.domain-and-contracts"]
required_outcome = "Implement SQLite and versioned Markdown repositories against the shared repository contract."
test_command = "PROJECT_IMPLEMENTATION=starter python -m pytest projects/tasks/tests/test_m2_persistence.py -q"

[[projects.milestones]]
id = "milestone.tasks.stdlib-http"
ordinal = 3
title = "Standard-library HTTP"
prerequisites = ["milestone.tasks.persistence"]
required_outcome = "Implement the http.server API and urllib client while making bytes, statuses, timeouts, and cleanup explicit."
test_command = "PROJECT_IMPLEMENTATION=starter python -m pytest projects/tasks/tests/test_m3_stdlib.py -q"

[[projects.milestones]]
id = "milestone.tasks.flask"
ordinal = 4
title = "Flask"
prerequisites = ["milestone.tasks.stdlib-http"]
required_outcome = "Implement a Flask application factory, centralized errors, and the requests transport."
test_command = "PROJECT_IMPLEMENTATION=starter python -m pytest projects/tasks/tests/test_m4_flask.py -q"

[[projects.milestones]]
id = "milestone.tasks.fastapi-and-parity"
ordinal = 5
title = "FastAPI and comparison"
prerequisites = ["milestone.tasks.flask"]
required_outcome = "Implement FastAPI and httpx boundaries, verify OpenAPI behavior, and complete cross-stack parity."
test_command = "PROJECT_IMPLEMENTATION=starter python -m pytest projects/tasks/tests/test_m5_fastapi_and_parity.py -q"

[[capstones]]
id = "capstone.comparative-kv"
title = "Comparative versioned configuration store"
required = true
prerequisites = ["module.concurrency", "project.tasks-rest-api-clients"]
guide_path = "capstones/comparative/README.md"
specification_paths = [
  "capstones/comparative/spec/SPEC.md",
  "capstones/comparative/spec/SCENARIOS.md",
  "capstones/comparative/spec/MANIFEST.sha256",
]
starter_root = "capstones/comparative/starter"
solution_root = "capstones/comparative/solution"
tests_root = "capstones/comparative/tests"
validation_commands = [
  "(cd capstones/comparative/spec && sha256sum -c MANIFEST.sha256)",
  "python -m compileall -q capstones/comparative/starter capstones/comparative/solution",
  "mypy --strict capstones/comparative/starter/comparative_kv",
  "CAPSTONE_IMPLEMENTATION=starter python -m unittest discover -s capstones/comparative/tests -p 'test_harness.py' -v",
]
solution_lock_group = "solutions.capstone.comparative-kv"
required_outcomes = [
  "Validate keys, expectations, revisions, and restricted JSON exactly.",
  "Implement the exact CLI grammar, envelopes, error channels, and exit codes.",
  "Initialize, validate, and migrate the versioned SQLite store atomically.",
  "Implement global revisions and compare-and-set mutations under transactions.",
  "Remain correct under independent-process races, contention, timeouts, and cleanup.",
]

[capstones.implementation_selector]
environment = "CAPSTONE_IMPLEMENTATION"
learner_value = "starter"
reference_value = "solution"
default_value = "solution"

[[capstones.milestones]]
id = "milestone.comparative-kv.domain"
ordinal = 1
title = "Domain"
prerequisites = []
required_outcome = "Implement keys, expectations, safe revisions, and restricted JSON validation."
test_command = "CAPSTONE_IMPLEMENTATION=starter python -m unittest discover -s capstones/comparative/tests -p 'test_m1_*.py' -v"

[[capstones.milestones]]
id = "milestone.comparative-kv.cli"
ordinal = 2
title = "CLI"
prerequisites = ["milestone.comparative-kv.domain"]
required_outcome = "Implement exact grammar, validation precedence, envelopes, stderr discipline, and exit mapping."
test_command = "CAPSTONE_IMPLEMENTATION=starter python -m unittest discover -s capstones/comparative/tests -p 'test_m2_*.py' -v"

[[capstones.milestones]]
id = "milestone.comparative-kv.sqlite"
ordinal = 3
title = "SQLite"
prerequisites = ["milestone.comparative-kv.cli"]
required_outcome = "Implement literal paths, WAL setup, schema initialization, invariant checks, and atomic migration."
test_command = "CAPSTONE_IMPLEMENTATION=starter python -m unittest discover -s capstones/comparative/tests -p 'test_m3_*.py' -v"

[[capstones.milestones]]
id = "milestone.comparative-kv.mutations"
ordinal = 4
title = "Mutations"
prerequisites = ["milestone.comparative-kv.sqlite"]
required_outcome = "Implement global revisions, compare-and-set mutations, ordering, exhaustion, and failure accounting."
test_command = "CAPSTONE_IMPLEMENTATION=starter python -m unittest discover -s capstones/comparative/tests -p 'test_m4_*.py' -v"

[[capstones.milestones]]
id = "milestone.comparative-kv.processes"
ordinal = 5
title = "Processes"
prerequisites = ["milestone.comparative-kv.mutations"]
required_outcome = "Remain correct through initialization, migration, mutation, and lock races across independent processes."
test_command = "CAPSTONE_IMPLEMENTATION=starter python -m unittest discover -s capstones/comparative/tests -p 'test_m5_*.py' -v"

[[capstones]]
id = "capstone.idiomatic-ingest-report"
title = "Idiomatic ingestion and reporting pipeline"
required = true
prerequisites = ["module.concurrency", "project.tasks-rest-api-clients"]
guide_path = "capstones/idiomatic/README.md"
specification_paths = ["capstones/idiomatic/SPEC.md"]
starter_root = "capstones/idiomatic/starter"
solution_root = "capstones/idiomatic/solution"
tests_root = "capstones/idiomatic/tests"
validation_commands = [
  "python -m compileall -q capstones/idiomatic/starter capstones/idiomatic/solution",
  "mypy --strict capstones/idiomatic/starter/ingest_report",
  "CAPSTONE_IMPLEMENTATION=starter python -m unittest discover -s capstones/idiomatic/tests -p 'test_harness.py' -v",
]
solution_lock_group = "solutions.capstone.idiomatic-ingest-report"
required_outcomes = [
  "Validate and normalize immutable events and stable single-pass deduplication.",
  "Stream CSV and JSONL sources behind injected application boundaries.",
  "Implement atomic SQLite imports with schema and identity guarantees.",
  "Filter, aggregate, and render deterministic JSON and text reports.",
  "Implement bounded paginated HTTP ingestion with strict cancellation and partial-failure semantics.",
]

[capstones.implementation_selector]
environment = "CAPSTONE_IMPLEMENTATION"
learner_value = "starter"
reference_value = "solution"
default_value = "solution"

[[capstones.milestones]]
id = "milestone.idiomatic-ingest-report.domain"
ordinal = 1
title = "Domain"
prerequisites = []
required_outcome = "Implement validation, UTC normalization, immutable values, and stable single-pass deduplication."
test_command = "CAPSTONE_IMPLEMENTATION=starter python -m unittest discover -s capstones/idiomatic/tests -p 'test_m1_*.py' -v"

[[capstones.milestones]]
id = "milestone.idiomatic-ingest-report.sources-and-application"
ordinal = 2
title = "Sources and application boundary"
prerequisites = ["milestone.idiomatic-ingest-report.domain"]
required_outcome = "Stream exact CSV and JSONL inputs, close iterators, inject collaborators, and classify CLI errors."
test_command = "CAPSTONE_IMPLEMENTATION=starter python -m unittest discover -s capstones/idiomatic/tests -p 'test_m2_*.py' -v"

[[capstones.milestones]]
id = "milestone.idiomatic-ingest-report.sqlite"
ordinal = 3
title = "SQLite"
prerequisites = ["milestone.idiomatic-ingest-report.sources-and-application"]
required_outcome = "Initialize and validate schema version 1 while preserving identities and atomic imports."
test_command = "CAPSTONE_IMPLEMENTATION=starter python -m unittest discover -s capstones/idiomatic/tests -p 'test_m3_*.py' -v"

[[capstones.milestones]]
id = "milestone.idiomatic-ingest-report.reporting"
ordinal = 4
title = "Reporting"
prerequisites = ["milestone.idiomatic-ingest-report.sqlite"]
required_outcome = "Combine filters, aggregate stable results, and render documented JSON and text reports."
test_command = "CAPSTONE_IMPLEMENTATION=starter python -m unittest discover -s capstones/idiomatic/tests -p 'test_m4_*.py' -v"

[[capstones.milestones]]
id = "milestone.idiomatic-ingest-report.http-and-integration"
ordinal = 5
title = "HTTP and integration"
prerequisites = ["milestone.idiomatic-ingest-report.reporting"]
required_outcome = "Implement bounded page fetching, ordered collection, cancellation cleanup, and strict or partial semantics."
test_command = "CAPSTONE_IMPLEMENTATION=starter python -m unittest discover -s capstones/idiomatic/tests -p 'test_m5_*.py' -v"

