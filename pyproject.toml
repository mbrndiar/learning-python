[tool.ruff]
target-version = "py311"
line-length = 88

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I", "UP"]

[tool.ruff.lint.per-file-ignores]
"exercises/*/exercises.py" = ["F401"]
"lessons/03_functions/02_lambdas_closures_and_recursion.py" = ["E731"]

[tool.mypy]
python_version = "3.11"
files = [
    "capstones/comparative/solution/comparative_kv",
    "capstones/idiomatic/solution/ingest_report",
]
strict = true
warn_unused_configs = true

[tool.coverage.run]
branch = true
include = [
    "capstones/comparative/solution/comparative_kv/*.py",
    "capstones/idiomatic/solution/ingest_report/*.py",
]
omit = [
    "capstones/comparative/solution/comparative_kv/__main__.py",
    "capstones/idiomatic/solution/ingest_report/__main__.py",
]

[tool.coverage.report]
fail_under = 85
show_missing = true
skip_covered = true
